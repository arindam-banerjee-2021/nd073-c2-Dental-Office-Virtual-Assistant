name: Deploy ContosoDentistryScheduler to Azure App Service

on:
  push:
    branches: [ main ]
    paths:
      - 'ContosoDentistryScheduler/**'
      - '.github/workflows/deploy-scheduler.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'
  AZURE_WEBAPP_NAME: contoso-dentistry-scheduler   # <-- change to your Web App name
  AZURE_WEBAPP_PACKAGE_PATH: ContosoDentistryScheduler

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: npm install
        run: |
          cd ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
          npm install --production

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_SCHEDULER }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
