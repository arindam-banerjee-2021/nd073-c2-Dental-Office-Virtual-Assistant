# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - contoso-chatbot-ab2026

on:
  push:
    branches:
      - main
    paths:
      - 'ContosoDentistryChatBot/**'
      - '.github/workflows/main_contoso-chatbot-ab2026.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: npm install (production deps)
        working-directory: ContosoDentistryChatBot
        run: |
          npm install --omit=dev --no-audit --no-fund
          ls -la node_modules | head -20
          echo "node_modules total size:"
          du -sh node_modules

      - name: Zip everything including node_modules
        working-directory: ContosoDentistryChatBot
        run: |
          zip -qr ../release.zip . -x ".git/*"
          ls -la ../release.zip

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App (zip)'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'contoso-chatbot-ab2026'
          slot-name: 'Production'
          package: release.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_9479D02CFBE24199AF577F723E1712CC }}
